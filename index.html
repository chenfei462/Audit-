<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AuditLens — 会计智能查账系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{--primary:#0f172a;--primary-light:#1e293b;--accent:#3b82f6;--accent-hover:#2563eb;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--purple:#8b5cf6;--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#0f172a;--text-secondary:#64748b;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);--shadow-lg:0 10px 25px rgba(0,0,0,.1);--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.navbar{background:var(--primary);color:#fff;padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.nav-brand{display:flex;align-items:center;gap:12px}
.nav-brand .logo{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.nav-brand h1{font-size:18px;font-weight:700;letter-spacing:1px}
.nav-brand .ver{font-size:11px;color:#94a3b8;margin-left:4px}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-user{font-size:13px;color:#cbd5e1;display:flex;align-items:center;gap:6px}
.nav-user .avatar{width:28px;height:28px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.nav-btn{padding:6px 14px;border:1px solid #475569;border-radius:6px;background:0 0;color:#cbd5e1;cursor:pointer;font-size:12px;transition:.2s}
.nav-btn:hover{background:#334155;border-color:#64748b}
.container{max-width:1280px;margin:0 auto;padding:24px}
.card{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow);border:1px solid var(--border);transition:.2s}
.card:hover{box-shadow:var(--shadow-lg)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.card-header h2{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:40px;text-align:center;cursor:pointer;transition:.3s;background:#fafbfc}
.upload-zone:hover{border-color:var(--accent);background:#eff6ff}
.upload-zone.dragover{border-color:var(--accent);background:#dbeafe;transform:scale(1.01)}
.upload-zone .icon{font-size:40px;margin-bottom:8px;opacity:.7}
input[type=file]{display:none}
.btn{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}.btn-primary:disabled{background:#94a3b8;cursor:not-allowed}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#059669}
.btn-purple{background:var(--purple);color:#fff}.btn-purple:hover{background:#7c3aed}
.btn-outline{background:0 0;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:#f1f5f9}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.stat-item{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border);position:relative;overflow:hidden;opacity:0;transform:translateY(20px);transition:all .5s ease}
.stat-item.visible{opacity:1;transform:translateY(0)}
.stat-item::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-item.st-total::before{background:var(--primary)}.stat-item.st-error::before{background:var(--danger)}
.stat-item.st-warning::before{background:var(--warning)}.stat-item.st-info::before{background:var(--accent)}
.stat-item.st-debit::before{background:var(--purple)}.stat-item.st-credit::before{background:var(--success)}
.stat-val{font-size:24px;font-weight:800;margin-top:4px}
.stat-label{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.st-error .stat-val{color:var(--danger)}.st-warning .stat-val{color:var(--warning)}.st-info .stat-val{color:var(--accent)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.chart-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--border);opacity:0;transform:scale(0.9);transition:all .6s ease}
.chart-card.visible{opacity:1;transform:scale(1)}
.chart-card h3{font-size:13px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.table-wrap{overflow-x:auto}
table.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{background:var(--primary);color:#fff;padding:10px 14px;text-align:left;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--border)}
.data-table tr:hover{background:#f8fafc}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.badge-error{background:#fef2f2;color:#dc2626}.badge-warning{background:#fffbeb;color:#d97706}.badge-info{background:#eff6ff;color:#2563eb}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--card);border-radius:16px;padding:40px;width:380px;max-width:90%;box-shadow:var(--shadow-lg)}
.modal h2{text-align:center;margin-bottom:24px;font-size:20px}
.modal input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:10px;transition:.2s}
.modal input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.modal .btn{width:100%;justify-content:center;margin-bottom:8px;padding:10px}
.modal .switch{text-align:center;color:var(--text-secondary);font-size:13px;margin-top:8px}
.modal .switch a{color:var(--accent);cursor:pointer;font-weight:600}
.ai-panel{background:linear-gradient(135deg,#faf5ff,#f0f0ff);border:1px solid #ddd6fe;border-radius:var(--radius);padding:24px;margin-bottom:20px}
.ai-panel .card-header h2{color:#6d28d9}
.ai-config{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.ai-config label{font-size:11px;color:#7c3aed;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.ai-config input,.ai-config select{padding:7px 10px;border:1px solid #ddd6fe;border-radius:6px;font-size:13px;width:100%}
.ai-result{background:#fff;border-radius:8px;padding:20px;margin-top:12px;line-height:1.8;max-height:500px;overflow-y:auto;border:1px solid #e9d5ff}
.ai-result h1,.ai-result h2,.ai-result h3{color:var(--primary);margin:14px 0 6px}
.ai-result ul,.ai-result ol{padding-left:20px}
.encrypt-panel{background:linear-gradient(135deg,#f0fdf4,#f0fff4);border:1px solid #bbf7d0;border-radius:var(--radius);padding:24px;margin-bottom:20px}
.encrypt-panel .card-header h2{color:#16a34a}
.encrypt-row{display:flex;gap:10px;align-items:end}
.encrypt-row input{padding:8px 12px;border:1px solid #bbf7d0;border-radius:6px;font-size:14px;flex:1}
.db-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.db-grid label{font-size:11px;color:var(--text-secondary);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.db-grid input,.db-grid select{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;width:100%}
.db-grid .full{grid-column:1/-1}
.loading{text-align:center;padding:40px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top:3px solid var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none}
.error-msg{background:#fef2f2;color:#dc2626;padding:14px 18px;border-radius:8px;margin-bottom:16px;border:1px solid #fecaca;font-size:14px}
/* Replay button */
.replay-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;color:var(--text-secondary);margin-left:auto;transition:.2s}
.replay-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
@media(max-width:900px){.stats-row{grid-template-columns:repeat(3,1fr)}.charts-grid,.ai-config{grid-template-columns:1fr}.db-grid{grid-template-columns:1fr}}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr)}.container{padding:12px}.encrypt-row{flex-direction:column}}
</style>
</head>
<body>
<div class="modal-overlay" id="loginModal">
<div class="modal">
<h2 id="modalTitle">&#x1F510; 登录</h2>
<div id="loginForm">
<input id="loginUser" placeholder="用户名" autofocus>
<input type="password" id="loginPass" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()">
<button class="btn btn-primary" onclick="doLogin()">登 录</button>
<div class="switch">没有账户？<a onclick="toggleReg()">立即注册</a></div>
</div>
<div id="regForm" class="hidden">
<input id="regUser" placeholder="用户名（≥3字符）">
<input type="password" id="regPass" placeholder="密码（≥6字符）">
<input id="regName" placeholder="显示名称">
<button class="btn btn-primary" onclick="doReg()">注 册</button>
<div class="switch">已有账户？<a onclick="toggleReg()">返回登录</a></div>
</div>
<div id="loginErr" style="color:var(--danger);text-align:center;margin-top:8px;font-size:13px"></div>
</div>
</div>

<nav class="navbar">
<div class="nav-brand"><div class="logo">&#x1F50D;</div><div><h1>AuditLens<span class="ver">v0.3</span></h1></div></div>
<div class="nav-right"><div class="nav-user"><div class="avatar" id="navAvatar">A</div><span id="navUser">管理员</span></div><button class="nav-btn" onclick="doLogout()">退出</button></div>
</nav>

<div class="container">
<div class="card">
<div class="card-header"><h2><span class="icon">&#x1F4C1;</span> 数据导入</h2></div>
<div class="upload-zone" id="uploadArea" onclick="document.getElementById('fileInput').click()">
<div class="icon">&#x1F4CA;</div><div style="font-size:15px;font-weight:600">点击或拖拽文件上传</div><div style="color:#a0aec0;font-size:12px;margin-top:4px">支持 CSV、Excel (.xlsx/.xls)</div>
</div>
<input type="file" id="fileInput" accept=".csv,.xlsx,.xls">
<div style="margin-top:14px;display:flex;align-items:center;gap:10px">
<button class="btn btn-primary" id="auditBtn" disabled onclick="startAudit()">&#x1F680; 开始审计</button>
<span id="fileName" style="color:var(--text-secondary);font-size:13px"></span>
</div>
</div>

<div class="card">
<div class="card-header"><h2><span class="icon">&#x1F5C4;</span> 数据库直连</h2></div>
<div class="db-grid">
<div><label>类型</label><select id="dbType"><option value="mysql">MySQL</option><option value="postgres">PostgreSQL</option></select></div>
<div><label>主机</label><input id="dbHost" placeholder="localhost:3306"></div>
<div><label>用户名</label><input id="dbUser" placeholder="root"></div>
<div><label>密码</label><input type="password" id="dbPass" placeholder="password"></div>
<div><label>数据库</label><input id="dbName" placeholder="accounting"></div>
<div><label>表名</label><input id="dbTable" placeholder="transactions"></div>
<div class="full"><label>自定义 SQL</label><input id="dbQuery" placeholder="留空则自动查询全表"></div>
<div><button class="btn btn-primary" onclick="auditFromDB()">&#x1F5C4; 查询并审计</button></div>
</div>
</div>

<div class="loading hidden" id="loading"><div class="spinner"></div><div style="color:var(--text-secondary)">审计分析中...</div></div>
<div id="errorBox" class="error-msg hidden"></div>

<div id="results" class="hidden">
<div class="stats-row" id="statsGrid"></div>
<div class="charts-grid">
<div class="chart-card" id="cc0"><h3>&#x1F4CA; 严重级别分布 <button class="replay-btn" onclick="replayChart('sev')">&#x21BB; 重播动画</button></h3><canvas id="severityChart"></canvas></div>
<div class="chart-card" id="cc1"><h3>&#x1F4C8; Benford 定律 <button class="replay-btn" onclick="replayChart('ben')">&#x21BB; 重播动画</button></h3><canvas id="benfordChart"></canvas></div>
<div class="chart-card" id="cc2"><h3>&#x1F4C5; 每日交易趋势 <button class="replay-btn" onclick="replayChart('tl')">&#x21BB; 重播动画</button></h3><canvas id="timelineChart"></canvas></div>
<div class="chart-card" id="cc3"><h3>&#x1F3F7; 规则触发统计 <button class="replay-btn" onclick="replayChart('ru')">&#x21BB; 重播动画</button></h3><canvas id="ruleChart"></canvas></div>
<div class="chart-card" id="cc4"><h3>&#x1F967; 科目金额分布 <button class="replay-btn" onclick="replayChart('ac')">&#x21BB; 重播动画</button></h3><canvas id="accountChart"></canvas></div>
<div class="chart-card" id="cc5"><h3>&#x1F4CA; 月度借贷对比 <button class="replay-btn" onclick="replayChart('mo')">&#x21BB; 重播动画</button></h3><canvas id="monthlyChart"></canvas></div>
</div>

<div class="ai-panel">
<div class="card-header"><h2><span class="icon">&#x1F916;</span> AI 智能分析</h2>
<div class="btn-group"><button class="btn btn-purple btn-sm" onclick="runLocalAi()">本地分析</button><button class="btn btn-purple btn-sm" onclick="runCloudAi()">云端 AI</button></div></div>
<div class="ai-config">
<div><label>AI 服务</label><select id="aiProv" onchange="updateAi()"><option value="deepseek">DeepSeek</option><option value="openai">OpenAI</option><option value="qwen">通义千问</option><option value="ollama">本地Ollama</option></select></div>
<div><label>API Key</label><input type="password" id="aiKey" placeholder="留空用本地分析"></div>
<div><label>模型</label><input id="aiModel" value="deepseek-chat"></div>
</div>
<div id="aiLoading" class="hidden" style="text-align:center;padding:16px"><div class="spinner"></div>分析中...</div>
<div id="aiResult" class="ai-result hidden"></div>
</div>

<div class="encrypt-panel">
<div class="card-header"><h2><span class="icon">&#x1F512;</span> 数据加密导出</h2></div>
<div class="encrypt-row">
<input type="password" id="encryptPwd" placeholder="设置加密密码">
<button class="btn btn-success btn-sm" onclick="encryptExport()">&#x1F512; 加密导出</button>
<button class="btn btn-outline btn-sm" onclick="document.getElementById('decryptFile').click()">&#x1F513; 解密导入</button>
<input type="file" id="decryptFile" accept=".json" style="display:none" onchange="decryptImport(event)">
</div>
</div>

<div class="card">
<div class="card-header"><h2><span class="icon">&#x1F4CB;</span> 审计发现明细</h2>
<div class="btn-group"><button class="btn btn-success btn-sm" onclick="exportPDF()">PDF</button><button class="btn btn-success btn-sm" onclick="exportJSON()">JSON</button><button class="btn btn-success btn-sm" onclick="exportCSV()">CSV</button></div></div>
<div class="table-wrap">
<table class="data-table" id="findingsTable"><thead><tr><th>#</th><th>级别</th><th>规则</th><th>说明</th><th>行号</th></tr></thead><tbody></tbody></table>
</div></div>
</div>
</div>

<script>
var auditData=null,selectedFile=null,chartData={},lastFindings=[];

// ===== Auth =====
function checkLogin(){fetch('/api/auth/me').then(function(r){return r.json()}).then(function(d){if(d.logged_in){document.getElementById('loginModal').classList.add('hidden');document.getElementById('navUser').textContent=d.display_name;document.getElementById('navAvatar').textContent=d.display_name[0]}else{document.getElementById('loginModal').classList.remove('hidden')}})}
function doLogin(){var u=document.getElementById('loginUser').value,p=document.getElementById('loginPass').value;fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})}).then(function(r){return r.json()}).then(function(d){if(d.success)checkLogin();else document.getElementById('loginErr').textContent=d.error||'登录失败'})}
function doReg(){var u=document.getElementById('regUser').value,p=document.getElementById('regPass').value,n=document.getElementById('regName').value;fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p,display_name:n||u})}).then(function(r){return r.json()}).then(function(d){if(d.success){document.getElementById('loginErr').textContent='注册成功';toggleReg()}else document.getElementById('loginErr').textContent=d.error})}
function doLogout(){fetch('/api/auth/logout',{method:'POST'}).then(function(){checkLogin()})}
function toggleReg(){document.getElementById('loginForm').classList.toggle('hidden');document.getElementById('regForm').classList.toggle('hidden');document.getElementById('modalTitle').textContent=document.getElementById('regForm').classList.contains('hidden')?'\u{1F510} 登录':'\u{1F4DD} 注册';document.getElementById('loginErr').textContent=''}
checkLogin();
function updateAi(){var p=document.getElementById('aiProv').value,m=document.getElementById('aiModel');m.value=p==='deepseek'?'deepseek-chat':p==='openai'?'gpt-4o-mini':p==='qwen'?'qwen-plus':'qwen2.5:7b'}

// ===== Upload =====
document.getElementById('fileInput').addEventListener('change',function(e){selectedFile=e.target.files[0];if(selectedFile){document.getElementById('fileName').textContent='\u2713 '+selectedFile.name;document.getElementById('auditBtn').disabled=false}});
var ua=document.getElementById('uploadArea');ua.ondragover=function(e){e.preventDefault();ua.classList.add('dragover')};ua.ondragleave=function(){ua.classList.remove('dragover')};ua.ondrop=function(e){e.preventDefault();ua.classList.remove('dragover');selectedFile=e.dataTransfer.files[0];document.getElementById('fileName').textContent='\u2713 '+selectedFile.name;document.getElementById('auditBtn').disabled=false};
function showLoad(){document.getElementById('loading').classList.remove('hidden');document.getElementById('results').classList.add('hidden')}
function hideLoad(){document.getElementById('loading').classList.add('hidden')}
function showErr(m){hideLoad();var b=document.getElementById('errorBox');b.textContent=m;b.classList.remove('hidden')}
function hideErr(){document.getElementById('errorBox').classList.add('hidden')}
function startAudit(){if(!selectedFile)return;showLoad();hideErr();var fd=new FormData();fd.append('file',selectedFile);fetch('/api/audit/file',{method:'POST',body:fd}).then(function(r){return r.json()}).then(function(d){hideLoad();if(d.error)return showErr(d.error);auditData=d;render(d)}).catch(function(e){showErr(e.message)})}
function auditFromDB(){var c={db_type:document.getElementById('dbType').value,host:document.getElementById('dbHost').value,user:document.getElementById('dbUser').value,password:document.getElementById('dbPass').value,database:document.getElementById('dbName').value,table:document.getElementById('dbTable').value,query:document.getElementById('dbQuery').value};if(!c.host||!c.database)return showErr('请填写主机和数据库名');showLoad();hideErr();fetch('/api/audit/database',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)}).then(function(r){return r.json()}).then(function(d){hideLoad();if(d.error)return showErr(d.error);auditData=d;render(d)}).catch(function(e){showErr(e.message)})}

// ===== Render =====
function sl(s){return s==='Error'?'错误':s==='Warning'?'警告':'信息'}
function sc(s){return s==='Error'?'error':s==='Warning'?'warning':'info'}
function render(d){
  document.getElementById('results').classList.remove('hidden');
  var f=d.findings||[],E=f.filter(function(x){return x.severity==='Error'}).length,W=f.filter(function(x){return x.severity==='Warning'}).length,I=f.filter(function(x){return x.severity==='Info'}).length;
  lastFindings=f;
  document.getElementById('statsGrid').innerHTML=
    '<div class="stat-item st-total"><div class="stat-label">交易总数</div><div class="stat-val">'+(d.total_transactions||0)+'</div></div>'+
    '<div class="stat-item st-error"><div class="stat-label">错误</div><div class="stat-val">'+E+'</div></div>'+
    '<div class="stat-item st-warning"><div class="stat-label">警告</div><div class="stat-val">'+W+'</div></div>'+
    '<div class="stat-item st-info"><div class="stat-label">信息</div><div class="stat-val">'+I+'</div></div>'+
    '<div class="stat-item st-debit"><div class="stat-label">借方总额</div><div class="stat-val" style="font-size:16px">'+(d.total_debit||0)+'</div></div>'+
    '<div class="stat-item st-credit"><div class="stat-label">贷方总额</div><div class="stat-val" style="font-size:16px">'+(d.total_credit||0)+'</div></div>';
  // Animate stat cards in with stagger
  setTimeout(function(){
    var items=document.querySelectorAll('.stat-item');
    items.forEach(function(el,i){setTimeout(function(){el.classList.add('visible')},i*100)});
  },50);
  // Animate chart cards
  setTimeout(function(){
    for(var i=0;i<6;i++){(function(idx){setTimeout(function(){var el=document.getElementById('cc'+idx);if(el)el.classList.add('visible')},idx*150)})(i)}
  },400);
  var tb=document.querySelector('#findingsTable tbody');
  if(!f.length)tb.innerHTML='<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--success)">\u2705 未发现异常</td></tr>';
  else tb.innerHTML=f.map(function(x,i){return'<tr><td>'+(i+1)+'</td><td><span class="badge badge-'+sc(x.severity)+'">'+sl(x.severity)+'</span></td><td>'+(x.rule_name||'')+'</td><td style="max-width:400px;word-break:break-all">'+(x.message||'')+'</td><td>'+((x.related_rows||[]).join(', ')||'-')+'</td></tr>'}).join('');
  drawCharts(d,f,E,W,I);
  document.getElementById('aiResult').classList.add('hidden');
}

// ===== Animated Charts =====
var charts={};
// Animation configurations for each chart type
var ANIM = {
  doughnut: { duration: 1500, easing: 'easeOutBounce', animateRotate: true, animateScale: true },
  bar: { duration: 1200, easing: 'easeOutElastic', delay: function(ctx){return ctx.dataIndex * 120} },
  line: { duration: 2000, easing: 'easeInOutQuart' },
  pie: { duration: 1500, easing: 'easeOutBounce', animateRotate: true, animateScale: true },
};

function makeChartOpts(type, extra){
  var base = {
    responsive: true,
    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 8, font: { size: 11 } } } },
    animation: {
      duration: ANIM[type] ? ANIM[type].duration : 1000,
      easing: ANIM[type] ? ANIM[type].easing : 'easeOutQuart',
    }
  };
  if(type==='doughnut'||type==='pie'){
    base.animation.animateRotate = true;
    base.animation.animateScale = true;
  }
  if(type==='bar' && ANIM.bar.delay){
    base.animation.delay = ANIM.bar.delay;
  }
  if(type==='line'){
    // Draw line progressively
    base.animation = {
      x: { type: 'number', easing: 'easeInOutQuart', duration: 1500, from: NaN, delay: function(ctx){return ctx.dataIndex * 80} },
      y: { type: 'number', easing: 'easeOutBounce', duration: 1000, from: function(ctx){return ctx.chart.scales.y ? ctx.chart.scales.y.max : 0}, delay: function(ctx){return ctx.dataIndex * 80} }
    };
  }
  for(var k in extra) base[k] = extra[k];
  return base;
}

function drawCharts(d,f,E,W,I){
  // Reset visibility for replay
  for(var i=0;i<6;i++){var el=document.getElementById('cc'+i);if(el)el.classList.remove('visible')}
  Object.values(charts).forEach(function(c){if(c)c.destroy()});
  charts={};
  chartData = {d:d, f:f, E:E, W:W, I:I};

  // 1. Severity doughnut - bouncy spin
  if(E+W+I>0){
    charts.sev=new Chart(document.getElementById('severityChart'),{
      type:'doughnut',
      data:{labels:['错误','警告','信息'],datasets:[{data:[E,W,I],backgroundColor:['#ef4444','#f59e0b','#3b82f6'],borderWidth:2,borderColor:'#fff',hoverOffset:15}]},
      options: makeChartOpts('doughnut', {cutout:'55%'})
    });
  }

  // 2. Benford bar - elastic bounce per bar
  var bf=f.find(function(x){return x.message&&x.message.indexOf('Benford')>=0});
  if(bf){
    var exp=[30.1,17.6,12.5,9.7,7.9,6.7,5.8,5.1,4.6],act=[],lines=bf.message.split('\n');
    for(var di=1;di<=9;di++){var found=false;for(var li=0;li<lines.length;li++){if(lines[li].indexOf('\u6570\u5B57'+di)>=0){var m=lines[li].match(/\u5B9E\u9645([\d.]+)%/);act.push(m?parseFloat(m[1]):0);found=true;break}}if(!found)act.push(0)}
    charts.ben=new Chart(document.getElementById('benfordChart'),{
      type:'bar',
      data:{labels:['1','2','3','4','5','6','7','8','9'],datasets:[
        {label:'实际',data:act,backgroundColor:'rgba(59,130,246,0.8)',borderColor:'#3b82f6',borderWidth:1,borderRadius:6,borderSkipped:false},
        {label:'理论',data:exp,backgroundColor:'rgba(203,213,225,0.6)',borderColor:'#cbd5e1',borderWidth:1,borderRadius:6,borderSkipped:false}
      ]},
      options: makeChartOpts('bar')
    });
  }

  // 3. Timeline - progressive line draw
  var sm=d.transactions_summary||[];
  if(sm.length){
    charts.tl=new Chart(document.getElementById('timelineChart'),{
      type:'line',
      data:{labels:sm.map(function(t){return t.date}),datasets:[
        {label:'借方',data:sm.map(function(t){return parseFloat(t.total_debit)}),borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.15)',tension:.4,fill:true,pointRadius:4,pointHoverRadius:8,pointBackgroundColor:'#ef4444'},
        {label:'贷方',data:sm.map(function(t){return parseFloat(t.total_credit)}),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.15)',tension:.4,fill:true,pointRadius:4,pointHoverRadius:8,pointBackgroundColor:'#10b981'}
      ]},
      options: makeChartOpts('line', {scales:{y:{beginAtZero:true}},interaction:{mode:'index',intersect:false},plugins:{tooltip:{mode:'index',intersect:false},legend:{position:'bottom',labels:{boxWidth:12,padding:8,font:{size:11}}}}})
    });
  }

  // 4. Rule counts - elastic horizontal bars
  var rc={};f.forEach(function(x){var n=x.rule_name||'?';rc[n]=(rc[n]||0)+1});var rn=Object.keys(rc);
  if(rn.length){
    var colors = ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#06b6d4','#ec4899','#84cc16'];
    charts.ru=new Chart(document.getElementById('ruleChart'),{
      type:'bar',
      data:{labels:rn,datasets:[{label:'数量',data:rn.map(function(n){return rc[n]}),backgroundColor:rn.map(function(_,i){return colors[i%colors.length]}),borderRadius:6,borderSkipped:false}]},
      options: makeChartOpts('bar', {indexAxis:'y',plugins:{legend:{display:false}}})
    });
  }

  // 5. Account distribution - spinning pie
  var acct={};f.forEach(function(x){if(x.message){var m=x.message.match(/\u79D1\u76EE\s*(\S+)/);if(m)acct[m[1]]=(acct[m[1]]||0)+1}});
  var an=Object.keys(acct).slice(0,8);
  if(an.length){
    charts.ac=new Chart(document.getElementById('accountChart'),{
      type:'pie',
      data:{labels:an,datasets:[{data:an.map(function(n){return acct[n]}),backgroundColor:['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#84cc16'],borderWidth:2,borderColor:'#fff',hoverOffset:12}]},
      options: makeChartOpts('pie')
    });
  }

  // 6. Monthly comparison - bouncy bars
  if(sm.length>1){
    var months={};sm.forEach(function(t){var mo=t.date.substring(0,7);if(!months[mo])months[mo]={d:0,c:0};months[mo].d+=parseFloat(t.total_debit);months[mo].c+=parseFloat(t.total_credit)});var mk=Object.keys(months).sort();
    charts.mo=new Chart(document.getElementById('monthlyChart'),{
      type:'bar',
      data:{labels:mk,datasets:[
        {label:'借方',data:mk.map(function(k){return Math.round(months[k].d)}),backgroundColor:'rgba(139,92,246,0.8)',borderColor:'#8b5cf6',borderWidth:1,borderRadius:6,borderSkipped:false},
        {label:'贷方',data:mk.map(function(k){return Math.round(months[k].c)}),backgroundColor:'rgba(16,185,129,0.8)',borderColor:'#10b981',borderWidth:1,borderRadius:6,borderSkipped:false}
      ]},
      options: makeChartOpts('bar')
    });
  }

  // Stagger chart card entrance
  setTimeout(function(){for(var j=0;j<6;j++){(function(idx){setTimeout(function(){var el=document.getElementById('cc'+idx);if(el)el.classList.add('visible')},idx*150)})(j)}},100);
}

// Replay a single chart animation
function replayChart(key){
  if(!chartData.d) return;
  var c = charts[key];
  if(c){
    // Reset and replay animation
    c.reset();
    c.update('active');
  }
}

// ===== AI =====
function runLocalAi(){if(!auditData)return;document.getElementById('aiLoading').classList.remove('hidden');document.getElementById('aiResult').classList.add('hidden');fetch('/api/ai/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({report:auditData})}).then(function(r){return r.json()}).then(function(d){document.getElementById('aiLoading').classList.add('hidden');var el=document.getElementById('aiResult');el.classList.remove('hidden');el.innerHTML=d.success?(typeof marked!=='undefined'?marked.parse(d.analysis):d.analysis.replace(/\n/g,'<br>')):'<div style="color:var(--danger)">'+d.error+'</div>'})}
function runCloudAi(){if(!auditData)return;var key=document.getElementById('aiKey').value;if(!key)return runLocalAi();var urls={deepseek:'https://api.deepseek.com/v1/chat/completions',openai:'https://api.openai.com/v1/chat/completions',qwen:'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions',ollama:'http://localhost:11434/v1/chat/completions'};document.getElementById('aiLoading').classList.remove('hidden');document.getElementById('aiResult').classList.add('hidden');fetch('/api/ai/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({report:auditData,api_url:urls[document.getElementById('aiProv').value],api_key:key,model:document.getElementById('aiModel').value})}).then(function(r){return r.json()}).then(function(d){document.getElementById('aiLoading').classList.add('hidden');var el=document.getElementById('aiResult');el.classList.remove('hidden');el.innerHTML=d.success?(typeof marked!=='undefined'?marked.parse(d.analysis):d.analysis.replace(/\n/g,'<br>')):'<div style="color:var(--danger)">'+d.error+'</div>'}).catch(function(e){document.getElementById('aiLoading').classList.add('hidden');document.getElementById('aiResult').classList.remove('hidden');document.getElementById('aiResult').innerHTML='<div style="color:var(--danger)">'+e.message+'</div>'})}

// ===== Encrypt =====
function encryptExport(){if(!auditData)return;var pwd=document.getElementById('encryptPwd').value;if(!pwd||pwd.length<4)return alert('请设置至少4位加密密码');fetch('/api/encrypt',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:JSON.stringify(auditData),password:pwd})}).then(function(r){return r.json()}).then(function(d){if(d.success)downloadBlob(new Blob([JSON.stringify(d.encrypted,null,2)],{type:'application/json'}),'audit_encrypted.json');else alert(d.error)})}
function decryptImport(e){var file=e.target.files[0];if(!file)return;var pwd=prompt('请输入解密密码：');if(!pwd)return;var reader=new FileReader();reader.onload=function(ev){try{var enc=JSON.parse(ev.target.result);fetch('/api/decrypt',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({encrypted:enc,password:pwd})}).then(function(r){return r.json()}).then(function(d){if(d.success){auditData=JSON.parse(d.data);render(auditData);alert('解密成功')}else alert('解密失败: '+d.error)})}catch(ex){alert('文件格式错误')}};reader.readAsText(file)}

// ===== Export =====
function exportJSON(){if(!auditData)return;downloadBlob(new Blob([JSON.stringify(auditData,null,2)],{type:'application/json'}),'audit_report.json')}
function exportCSV(){if(!auditData)return;var f=auditData.findings||[],csv='\uFEFF序号,级别,规则,说明,行号\n';f.forEach(function(x,i){csv+='"'+(i+1)+'","'+x.severity+'","'+(x.rule_name||'')+'","'+((x.message||'').replace(/"/g,'""').replace(/\n/g,' '))+'","'+((x.related_rows||[]).join(';'))+'"\n'});downloadBlob(new Blob([csv],{type:'text/csv;charset=utf-8'}),'audit_report.csv')}
function exportPDF(){if(!auditData)return;fetch('/api/export/pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({report:auditData})}).then(function(r){if(!r.ok)throw new Error('失败');return r.blob()}).then(function(b){downloadBlob(b,'audit_report.pdf')}).catch(function(e){alert(e.message)})}
function downloadBlob(b,f){var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=f;a.click()}
</script>
