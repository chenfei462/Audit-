# AuditLens 默认审计规则配置文件
# =============================================

[general]
# 货币精度（小数位数）
decimal_places = 2

# ── 借贷平衡检查 ──
[rules.balance_check]
enabled = true
# 允许的借贷差额容差（应对四舍五入误差）
tolerance = "0.01"

# ── 金额阈值检测 ──
[rules.threshold]
enabled = true
# 大额交易阈值（超过此金额将被标记）
amount_threshold = "50000.00"

# ── 重复交易识别 ──
[rules.duplicate]
enabled = true
# 时间窗口（天数），在此范围内的相同金额+科目视为疑似重复
time_window_days = 1

# ── 日期连续性检查 ──
[rules.date_continuity]
enabled = true
# 允许的最大日期间隔（天数），超过则视为异常间断
max_gap_days = 7

# ── 科目合规性检查 ──
[rules.account_compliance]
enabled = true
# 合法科目列表（会计科目编码）
valid_accounts = [
    "1001",  # 库存现金
    "1002",  # 银行存款
    "1012",  # 其他货币资金
    "1101",  # 交易性金融资产
    "1121",  # 应收票据
    "1122",  # 应收账款
    "1221",  # 其他应收款
    "1231",  # 坏账准备
    "1401",  # 材料采购
    "1403",  # 原材料
    "1405",  # 库存商品
    "1601",  # 固定资产
    "1602",  # 累计折旧
    "2001",  # 短期借款
    "2201",  # 应付账款
    "2211",  # 应付职工薪酬
    "2221",  # 应交税费
    "4001",  # 实收资本
    "4002",  # 资本公积
    "4101",  # 盈余公积
    "4103",  # 本年利润
    "4104",  # 利润分配
    "5001",  # 生产成本
    "5101",  # 制造费用
    "6001",  # 主营业务收入
    "6051",  # 其他业务收入
    "6301",  # 营业外收入
    "6401",  # 主营业务成本
    "6402",  # 其他业务成本
    "6601",  # 销售费用
    "6602",  # 管理费用
    "6603",  # 财务费用
    "6711",  # 营业外支出
]

# ── 整数金额预警 ──
[rules.round_amount]
enabled = true
# 整数金额出现次数阈值，超过则预警
count_threshold = 5

# ── 异常检测（Z-Score）──
[anomaly]
enabled = true
# Z-Score 阈值，超过此值视为异常
zscore_threshold = 3.0
# 是否按科目分组进行异常检测
group_by_account = true
